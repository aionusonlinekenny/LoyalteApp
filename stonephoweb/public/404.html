<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stone Pho - Page Not Found</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #dc2626 0%, #991b1b 100%);
            color: white;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            padding: 2rem;
            max-width: 500px;
        }
        h1 {
            font-size: 4rem;
            margin: 0;
            opacity: 0.9;
        }
        h2 {
            font-size: 1.5rem;
            margin: 1rem 0;
            font-weight: 300;
        }
        p {
            font-size: 1.1rem;
            margin: 1.5rem 0;
            opacity: 0.8;
        }
        .btn {
            display: inline-block;
            background: white;
            color: #dc2626;
            padding: 12px 24px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: 600;
            margin: 10px;
            transition: transform 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
        }
        .logo {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            margin: 0 auto 2rem;
            object-fit: cover;
        }
    </style>
    <script>
        // Auto redirect to home after 5 seconds
        setTimeout(() => {
            window.location.href = '/';
        }, 5000);
    </script>
</head>
<body>
    <div class="container">
        <img src="/logo.png" alt="Stone Pho" class="logo">
        <h1>404</h1>
        <h2>Oops! Page Not Found</h2>
        <p>The page you're looking for doesn't exist, but our delicious pho is waiting for you!</p>
        <a href="/" class="btn">🏠 Back to Home</a>
        <a href="/#menu" class="btn">🍜 View Menu</a>
        <p>Website is being updated...</p>
        <p>Please contact us: <strong>(229) 491-9905</strong></p>
        <a href="tel:+12294919905" class="btn">📞 Call Now</a>
    </div>
    
    <script>
        let count = 5;
        const countdown = document.getElementById('countdown');
        setInterval(() => {
            count--;
            countdown.textContent = count;
            if (count <= 0) {
                window.location.href = '/';
            }
        }, 1000);
    </script>
</body>
</html>
